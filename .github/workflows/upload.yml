name: Process Uploads

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  upload-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare file from issue
        id: prepare
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          FILE_NAME="${ISSUE_TITLE#Upload: }"
          FILE_NAME="$(echo "$FILE_NAME" | xargs)"
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

          echo "$ISSUE_BODY" > issue_body.txt
          BASE64_CONTENT=$(sed -n '/```/,/```/p' issue_body.txt | sed '1d;$d')

          echo "BASE64_CONTENT<<EOF" >> $GITHUB_ENV
          echo "$BASE64_CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Decode file
        run: |
          mkdir -p uploads
          echo "$BASE64_CONTENT" | base64 -d > "uploads/$FILE_NAME"

      - name: Commit file
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add uploads/
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Upload $FILE_NAME via issue"
          git push
