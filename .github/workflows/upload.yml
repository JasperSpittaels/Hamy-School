name: Process Uploads

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: read

jobs:
  upload-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare file from issue
        id: prepare
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "Issue title: $ISSUE_TITLE"

          # Bestandsnaam uit titel halen: "Upload: naam.ext" -> "naam.ext"
          FILE_NAME="${ISSUE_TITLE#Upload: }"
          FILE_NAME="$(echo "$FILE_NAME" | xargs)"  # trim spaties

          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV

          # Base64 blok uit de issue body halen (tussen ``` en ```)
          echo "$ISSUE_BODY" > issue_body.txt
          BASE64_CONTENT=$(sed -n '/```/,/```/p' issue_body.txt | sed '1d;$d')

          if [ -z "$BASE64_CONTENT" ]; then
            echo "Geen base64 content gevonden in issue body."
            exit 1
          fi

          echo "BASE64_CONTENT<<EOF" >> $GITHUB_ENV
          echo "$BASE64_CONTENT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Decode file
        run: |
          mkdir -p uploads
          echo "$BASE64_CONTENT" | base64 -d > "uploads/$FILE_NAME"

      - name: Commit file
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          git add uploads/

          # Geen commit maken als er niets veranderd is
          if git diff --cached --quiet; then
            echo "Geen wijzigingen om te committen."
            exit 0
          fi

          git commit -m "Upload $FILE_NAME via issue"
          git push
