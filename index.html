<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamy School</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

  <header>
    <h1>Hamy School</h1>
  </header>

  <main>	
	<!-- Bestand uploaden -->
    <section class="upload-box">
	  <h2>⬆️ Bestand uploaden</h2>
	  <input type="file" id="bestand-input" />
	  <button id="upload-btn">Uploaden</button>
	  <p id="upload-status"></p>
    </section>
	
	<!-- Breadcrumb navigatie -->
    <div id="breadcrumb"></div>
	
    <!-- Map aanmaken -->
    <section class="upload-box">
	  <h2>📁 Nieuwe map</h2>
	  <div class="rij">
	    <input type="text" id="map-naam-input" placeholder="Mapnaam (bijv. Wiskunde)" />
	    <button id="map-aanmaken-btn">➕ Aanmaken</button>
	  </div>
    </section>

    <!-- Lijst -->
    <section id="bestanden-lijst"></section>
  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
